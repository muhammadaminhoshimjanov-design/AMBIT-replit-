kind = "mobile"
previewPath = "/"
title = "Ambit"
version = "1.0.0"
id = "artifacts/ambit"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19907

[services.development]
run = "pnpm --filter @workspace/ambit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ambit", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ambit", "run", "serve" ]

[services.env]
PORT = "19907"
BASE_PATH = "/"
